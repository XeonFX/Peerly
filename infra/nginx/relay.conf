log_format relay_no_query '$remote_addr - $host [$time_local] '
                          '"$request_method $uri $server_protocol" $status $body_bytes_sent';

upstream peerly_relay { server 127.0.0.1:8090; keepalive 32; }

server {
    listen 127.0.0.1:8443 ssl http2;
    server_name relay-eu.peerly.cc;
    access_log /var/log/nginx/peerly-relay.access.log relay_no_query;
    error_log /var/log/nginx/peerly-relay.error.log warn;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://peerly_relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering off;
    }
}

