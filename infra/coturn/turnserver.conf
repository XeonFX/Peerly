listening-ip=0.0.0.0
relay-ip=PUBLIC_IPV4
external-ip=PUBLIC_IPV4
realm=turn-eu.peerly.cc
server-name=turn-eu.peerly.cc
use-auth-secret
static-auth-secret=LOAD_FROM_ROOT_ONLY_ENV_OR_GENERATED_CONFIG
stale-nonce=600
max-allocate-timeout=10
user-quota=12
total-quota=2000
max-bps=2000000
no-multicast-peers
no-loopback-peers
min-port=49152
max-port=65535
cert=/etc/letsencrypt/live/turn-eu.peerly.cc/fullchain.pem
pkey=/etc/letsencrypt/live/turn-eu.peerly.cc/privkey.pem
no-stdout-log
log-file=/var/log/turnserver/turn.log

