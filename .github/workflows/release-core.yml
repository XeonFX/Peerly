name: Release @peerly/core

# Publish @peerly/core via npm Trusted Publishing (OIDC).
# npmjs.com → @peerly/core → Trusted publishing → XeonFX/Peerly / release-core.yml
#
# Real release: dry_run=false, bump=patch|minor|major → tests → bump (lockstep
# app + core) → publish to npm → open a PR (main is protected) → push tags.
# Dry run: same bump + pack/publish --dry-run, no git changes.
#
# main requires PRs + status checks — never push HEAD:main from this workflow.
# For 0.3.0 from 0.2.x: dry_run=false, bump=minor.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'npm publish --dry-run only (still bumps versions in the runner workspace)'
        type: boolean
        default: true
      bump:
        description: 'Semver bump before publish (lockstep: peerly + @peerly/core)'
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify toolchain majors
        run: |
          node --version | grep -Eq '^v24\.' || (echo "need Node 24.x, got $(node --version)" && exit 1)
          npm --version | grep -Eq '^11\.' || (echo "need npm 11.x, got $(npm --version)" && exit 1)

      # workflow_dispatch booleans may be real booleans or the strings "true"/"false".
      - name: Normalize inputs
        id: flags
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Build and test against the package
        run: |
          npm run lint
          npm test

      # Bump even on dry_run so the tarball is a *new* version.
      - name: Bump versions (lockstep)
        if: steps.flags.outputs.bump != 'none'
        id: bump
        run: |
          node scripts/bump-version.mjs "${{ steps.flags.outputs.bump }}" packages/core/package.json package.json
          npm install --package-lock-only
          node -p "'core ' + require('./packages/core/package.json').version"
          node -p "'app  ' + require('./package.json').version"

      - name: Resolve package version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Target @peerly/core@${VERSION} (dry_run=${{ steps.flags.outputs.dry_run }})"

      - name: Refuse to re-publish an existing version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@peerly/core@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::@peerly/core@${VERSION} is already on npm. Pick a higher bump (or bump≠none)."
            exit 1
          fi
          echo "@peerly/core@${VERSION} is not on npm yet — ok to proceed."

      - name: Publish
        working-directory: packages/core
        run: |
          npm run build
          npm pack --dry-run
          if [ "${{ steps.flags.outputs.dry_run }}" = "true" ]; then
            echo "Dry run — not publishing to the registry."
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi

      # main is protected (PR required + status checks). Open a release PR instead
      # of git push origin HEAD:main.
      # Requires: Settings → Actions → General → Workflow permissions
      # → "Allow GitHub Actions to create and approve pull requests"
      - name: Open release PR and push tags
        if: steps.flags.outputs.dry_run == 'false' && steps.flags.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/core-v${VERSION}"
          BUMP="${{ steps.flags.outputs.bump }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add packages/core/package.json package.json package-lock.json
          git commit -m "chore: release @peerly/core v${VERSION}"

          # Tags point at the release commit; not subject to the main PR rule.
          git tag "core-v${VERSION}"
          git tag "v${VERSION}"

          git push origin "HEAD:refs/heads/${BRANCH}"
          git push origin "core-v${VERSION}" "v${VERSION}"

          # Write PR body to a file so the markdown never breaks YAML parsing
          # (unindented ## / - lines inside a heredoc end the run: | block).
          BODY_FILE=$(mktemp)
          {
            echo "## Release @peerly/core v${VERSION}"
            echo ""
            echo "Automated by **Release @peerly/core** (bump=\`${BUMP}\`)."
            echo ""
            echo "- [x] npm: \`@peerly/core@${VERSION}\` already published"
            echo "- [ ] Merge this PR so \`main\` matches the published version"
            echo "- [ ] Then run HeyHubs **Release** with \`sync_core=true\` if consumers should pick it up"
            echo ""
            echo "Tags: \`core-v${VERSION}\`, \`v${VERSION}\`"
          } > "$BODY_FILE"

          if ! PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release @peerly/core v${VERSION}" \
            --body-file "$BODY_FILE" 2>&1); then
            echo "::error::Could not open PR (npm + tags already done)."
            echo "$PR_URL"
            echo "Enable: Settings → Actions → General → Workflow permissions →"
            echo "  Allow GitHub Actions to create and approve pull requests"
            echo "Then open: https://github.com/${{ github.repository }}/compare/main...${BRANCH}?expand=1"
            exit 1
          fi

          echo "Opened release PR: ${PR_URL}"

      - name: Dry-run summary
        if: steps.flags.outputs.dry_run == 'true'
        run: |
          echo "Dry run complete — would publish @peerly/core@${{ steps.version.outputs.version }}"
          echo "Re-run with dry_run=false to publish, open a release PR, and push tags."
