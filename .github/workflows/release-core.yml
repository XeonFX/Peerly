name: Release @peerly/core

# Manual publish of packages/core to npm via Trusted Publishing (OIDC).
# Configure on npmjs.com: @peerly/core → Settings → Trusted publishing
#   Organization: XeonFX  Repository: Peerly  Workflow: release-core.yml
# Bump packages/core/package.json, merge to main, then run this workflow.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'npm publish --dry-run (inspect, publish nothing)'
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify toolchain majors
        run: |
          node --version | grep -Eq '^v24\.' || (echo "need Node 24.x, got $(node --version)" && exit 1)
          npm --version | grep -Eq '^11\.' || (echo "need npm 11.x, got $(npm --version)" && exit 1)

      - run: npm ci

      - name: Build and test against the package
        run: |
          npm run lint
          npm test

      - name: Publish
        working-directory: packages/core
        run: |
          npm run build
          npm pack --dry-run
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi