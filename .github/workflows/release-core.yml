name: Release @peerly/core

# Publish @peerly/core via npm Trusted Publishing (OIDC).
# npmjs.com → @peerly/core → Trusted publishing → XeonFX/Peerly / release-core.yml
#
# Real release: dry_run=false, bump=patch|minor|major → tests → bump (lockstep
# app + core) → publish → commit + tag on main.
# Dry run: same bump + pack/publish --dry-run, no git push.
#
# For 0.3.0 from 0.2.x: dry_run=false, bump=minor (not the default patch).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'npm publish --dry-run only (still bumps versions in the runner workspace)'
        type: boolean
        default: true
      bump:
        description: 'Semver bump before publish (lockstep: peerly + @peerly/core)'
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify toolchain majors
        run: |
          node --version | grep -Eq '^v24\.' || (echo "need Node 24.x, got $(node --version)" && exit 1)
          npm --version | grep -Eq '^11\.' || (echo "need npm 11.x, got $(npm --version)" && exit 1)

      - run: npm ci

      - name: Build and test against the package
        run: |
          npm run lint
          npm test

      # workflow_dispatch booleans are strings ("true"/"false"), not JSON booleans.
      # Bump even on dry_run so the tarball is a *new* version (0.2.1 is already on npm).
      - name: Bump versions (lockstep)
        if: inputs.bump != 'none'
        id: bump
        run: |
          node scripts/bump-version.mjs "${{ inputs.bump }}" packages/core/package.json package.json
          npm install --package-lock-only
          node -p "'core ' + require('./packages/core/package.json').version"
          node -p "'app  ' + require('./package.json').version"

      - name: Resolve package version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Target @peerly/core@${VERSION} (dry_run=${{ inputs.dry_run }})"

      - name: Refuse to re-publish an existing version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@peerly/core@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::@peerly/core@${VERSION} is already on npm. Pick a higher bump (or bump≠none)."
            exit 1
          fi
          echo "@peerly/core@${VERSION} is not on npm yet — ok to proceed."

      - name: Publish
        working-directory: packages/core
        run: |
          npm run build
          npm pack --dry-run
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — not publishing to the registry."
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi

      - name: Commit version bump and tag
        if: inputs.dry_run != 'true' && inputs.bump != 'none'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json package.json package-lock.json
          git commit -m "chore: release @peerly/core v${VERSION}"
          git tag "core-v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main --follow-tags
